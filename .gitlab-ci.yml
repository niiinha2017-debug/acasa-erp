# Pipeline: a cada push em main, builda Android + Tauri (Desktop), publica APKs e .exe no Lightsail (Ubuntu).
# Variáveis em Settings → CI/CD → Variables: EC2_HOST (ubuntu@44.205.23.128), EC2_SSH_PRIVATE_KEY (chave Lightsail).
# Jobs rodam nos runners do GitLab (shared). Nenhum runner local no PC.

default:
  image: node:20-bookworm

variables:
  ANDROID_HOME: "$CI_PROJECT_DIR/android-sdk"
  JAVA_HOME: "/usr/lib/jvm/java-17-openjdk-amd64"
  GRADLE_USER_HOME: "${CI_PROJECT_DIR}/.gradle"

stages:
  - prepare
  - build   # Android e Desktop rodam em paralelo
  - deploy

# Instala JDK 17 + Android SDK (uma vez por job). Roda nos runners do GitLab (shared).
prepare:android:
  stage: prepare
  script:
    - apt-get update -qq && apt-get install -y -qq openjdk-17-jdk wget unzip ssh-client
    - export JAVA_HOME=/usr/lib/jvm/java-17-openjdk-amd64
    - |
      mkdir -p "$ANDROID_HOME/cmdline-tools"
      rm -rf "$ANDROID_HOME/cmdline-tools/cmdline-tools" "$ANDROID_HOME/cmdline-tools/latest"
      wget -q https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip -O /tmp/cmdline-tools.zip
      unzip -q /tmp/cmdline-tools.zip -d "$ANDROID_HOME/cmdline-tools"
      mv "$ANDROID_HOME/cmdline-tools/cmdline-tools" "$ANDROID_HOME/cmdline-tools/latest"
      yes | "$ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager" --sdk_root="$ANDROID_HOME" "platforms;android-35" "build-tools;35.0.0" "platform-tools" || true
    - export PATH="$ANDROID_HOME/platform-tools:$ANDROID_HOME/cmdline-tools/latest/bin:$PATH"
    - java -version
  artifacts:
    expire_in: 1 day
    paths:
      - android-sdk/
  cache:
    key: android-sdk
    paths:
      - android-sdk/

build:android:
  stage: build
  dependencies:
    - prepare:android
  cache:
    key: gradle-${CI_COMMIT_REF_SLUG}
    paths:
      - .gradle/
      - frontend/android/.gradle/
      - frontend-ponto/android/.gradle/
  before_script:
    - apt-get update -qq && apt-get install -y -qq openjdk-17-jdk
    - export JAVA_HOME=/usr/lib/jvm/java-17-openjdk-amd64
    - export PATH="$ANDROID_HOME/platform-tools:$ANDROID_HOME/cmdline-tools/latest/bin:$PATH"
    - npm ci --prefix frontend
    - npm ci --prefix frontend-ponto || true
    # Keystore para assinar release (como no GitHub): variáveis em Settings → CI/CD → Variables
    - |
      if [ -n "${ANDROID_KEYSTORE_BASE64:-}" ] && [ -n "${ANDROID_KEYSTORE_PASSWORD:-}" ] && [ -n "${ANDROID_KEY_ALIAS:-}" ] && [ -n "${ANDROID_KEY_PASSWORD:-}" ]; then
        echo "$ANDROID_KEYSTORE_BASE64" | base64 -d > "$CI_PROJECT_DIR/android-release.keystore"
        KEYSTORE_PROPS="storeFile=../../../android-release.keystore
      storePassword=$ANDROID_KEYSTORE_PASSWORD
      keyAlias=$ANDROID_KEY_ALIAS
      keyPassword=$ANDROID_KEY_PASSWORD"
        echo "$KEYSTORE_PROPS" > "$CI_PROJECT_DIR/frontend/android/keystore.properties"
        echo "$KEYSTORE_PROPS" > "$CI_PROJECT_DIR/frontend-ponto/android/keystore.properties"
        echo "Keystore configurado: release será assinado."
      else
        echo "Keystore não configurado no CI: APKs serão unsigned. Para assinar, defina ANDROID_KEYSTORE_BASE64, ANDROID_KEYSTORE_PASSWORD, ANDROID_KEY_ALIAS, ANDROID_KEY_PASSWORD."
      fi
  script:
    - chmod +x "$CI_PROJECT_DIR/frontend/android/gradlew" "$CI_PROJECT_DIR/frontend-ponto/android/gradlew"
    - cd "$CI_PROJECT_DIR/frontend" && npm run build && npx cap sync android
    - cd "$CI_PROJECT_DIR/frontend/android" && ./gradlew assembleRelease --no-daemon
    - |
      RELEASE_DIR="$CI_PROJECT_DIR/frontend/android/app/build/outputs/apk/release"
      if [ -f "$RELEASE_DIR/app-release-unsigned.apk" ] && [ ! -f "$RELEASE_DIR/app-release.apk" ]; then
        cp "$RELEASE_DIR/app-release-unsigned.apk" "$RELEASE_DIR/app-release.apk"
      fi
    - cd "$CI_PROJECT_DIR/frontend-ponto" && npm run build && npx cap sync android
    - cd "$CI_PROJECT_DIR/frontend-ponto/android" && ./gradlew assembleRelease --no-daemon
    - |
      RELEASE_DIR="$CI_PROJECT_DIR/frontend-ponto/android/app/build/outputs/apk/release"
      if [ -f "$RELEASE_DIR/app-release-unsigned.apk" ] && [ ! -f "$RELEASE_DIR/app-release.apk" ]; then
        cp "$RELEASE_DIR/app-release-unsigned.apk" "$RELEASE_DIR/app-release.apk"
      fi
    - cd "$CI_PROJECT_DIR"
  artifacts:
    expire_in: 1 day
    paths:
      - frontend/android/app/build/outputs/apk/release/app-release.apk
      - frontend-ponto/android/app/build/outputs/apk/release/app-release.apk

# Recebe artefatos de todos os estágios anteriores (sem dependencies/needs)
deploy:ec2:
  stage: deploy
  needs:
    - job: prepare:android
      artifacts: true
    - job: build:android
      artifacts: true
  before_script:
    - apt-get update -qq && apt-get install -y -qq ssh-client
    - |
      if [ -z "${EC2_SSH_PRIVATE_KEY:-}" ]; then
        echo "ERRO: Defina a variável EC2_SSH_PRIVATE_KEY em Settings → CI/CD → Variables"
        exit 1
      fi
      if [ -z "${EC2_HOST:-}" ]; then
        echo "ERRO: Defina a variável EC2_HOST em Settings → CI/CD → Variables"
        exit 1
      fi
    - |
      if [ -f "$EC2_SSH_PRIVATE_KEY" ]; then
        export SSH_KEY_FILE="$EC2_SSH_PRIVATE_KEY"
      else
        echo "$EC2_SSH_PRIVATE_KEY" > "$CI_PROJECT_DIR/deploy_key.pem"
        chmod 600 "$CI_PROJECT_DIR/deploy_key.pem"
        export SSH_KEY_FILE="$CI_PROJECT_DIR/deploy_key.pem"
      fi
    - mkdir -p ~/.ssh && ssh-keyscan -H "${EC2_HOST#*@}" >> ~/.ssh/known_hosts 2>/dev/null || true

  script:
    - cd "$CI_PROJECT_DIR"
    - |
      echo "=== Artefatos do build:android ==="
      ls -la frontend/android/app/build/outputs/apk/release/ 2>/dev/null || true
      ls -la frontend-ponto/android/app/build/outputs/apk/release/ 2>/dev/null || true
      if [ ! -f "frontend/android/app/build/outputs/apk/release/app-release.apk" ] || [ ! -f "frontend-ponto/android/app/build/outputs/apk/release/app-release.apk" ]; then
        echo "ERRO: APKs não encontrados. Verifique se o job build:android gerou os artefatos."
        exit 1
      fi
    - |
      if [ -f aplicativo-site/updates/android/version.json ]; then
        node -e "const j=require('./aplicativo-site/updates/android/version.json'); j.version=require('./frontend/package.json').version; require('fs').writeFileSync('/tmp/version.json', JSON.stringify(j,null,2))"
      else
        VERSION=$(node -p "require('./frontend/package.json').version")
        echo "{\"version\":\"$VERSION\",\"url\":\"https://aplicativo.acasamarcenaria.com.br/erp/Acasa.apk\"}" > /tmp/version.json
      fi
    - |
      if [ -f aplicativo-site/updates/ponto/version.json ]; then
        node -e "const j=require('./aplicativo-site/updates/ponto/version.json'); j.version=require('./frontend-ponto/package.json').version; require('fs').writeFileSync('/tmp/version-ponto.json', JSON.stringify(j,null,2))"
      else
        VERSION_PONTO=$(node -p "require('./frontend-ponto/package.json').version")
        echo "{\"version\":\"$VERSION_PONTO\",\"url\":\"https://ponto.acasamarcenaria.com.br/ponto.apk\"}" > /tmp/version-ponto.json
      fi
    - scp -i "$SSH_KEY_FILE" -o StrictHostKeyChecking=accept-new /tmp/version.json "${EC2_HOST}:/home/ubuntu/version.json"
    - scp -i "$SSH_KEY_FILE" -o StrictHostKeyChecking=accept-new /tmp/version-ponto.json "${EC2_HOST}:/home/ubuntu/version-ponto.json"
    - scp -i "$SSH_KEY_FILE" -o StrictHostKeyChecking=accept-new "$CI_PROJECT_DIR/frontend/android/app/build/outputs/apk/release/app-release.apk" "${EC2_HOST}:/home/ubuntu/Acasa.apk"
    - scp -i "$SSH_KEY_FILE" -o StrictHostKeyChecking=accept-new "$CI_PROJECT_DIR/frontend-ponto/android/app/build/outputs/apk/release/app-release.apk" "${EC2_HOST}:/home/ubuntu/ponto.apk"

    - scp -i "$SSH_KEY_FILE" -o StrictHostKeyChecking=accept-new "$CI_PROJECT_DIR/aplicativo-site/index.html" "${EC2_HOST}:/home/ubuntu/index-aplicativo.html"

    - |
      echo "==> Build PWA do Ponto (relógio por ID de funcionário)"
      npm ci --prefix frontend-ponto
      cd frontend-ponto && npm run build && cd ..
      tar czf /tmp/ponto-dist.tar.gz -C frontend-ponto/dist .
    - scp -i "$SSH_KEY_FILE" -o StrictHostKeyChecking=accept-new /tmp/ponto-dist.tar.gz "${EC2_HOST}:/home/ubuntu/ponto-dist.tar.gz"

    - |
      ssh -i "$SSH_KEY_FILE" -o StrictHostKeyChecking=accept-new "$EC2_HOST" \
        "sudo mkdir -p /var/www/aplicativo/erp /var/www/aplicativo/updates/android /var/www/ponto /var/www/aplicativo/downloads && \
         sudo mv /home/ubuntu/version.json /var/www/aplicativo/updates/android/ && \
         sudo mv /home/ubuntu/Acasa.apk /var/www/aplicativo/erp/ && \
         sudo rm -rf /var/www/ponto/* && \
         sudo tar xzf /home/ubuntu/ponto-dist.tar.gz -C /var/www/ponto && \
         sudo mv /home/ubuntu/ponto.apk /var/www/ponto/ && \
         sudo mv /home/ubuntu/version-ponto.json /var/www/ponto/version.json && \
         sudo cp /home/ubuntu/index-aplicativo.html /var/www/aplicativo/index.html && \
         sudo cp /home/ubuntu/index-aplicativo.html /var/www/aplicativo/downloads/index.html && \
         sudo rm -f /home/ubuntu/index-aplicativo.html /home/ubuntu/ponto-dist.tar.gz && \
         sudo chown -R www-data:www-data /var/www/aplicativo/erp /var/www/aplicativo/updates /var/www/ponto /var/www/aplicativo/index.html /var/www/aplicativo/downloads"
  environment:
    name: production

# Atualiza código na EC2: git pull, backend (migrate + restart), frontend web (build + rsync)
deploy:ec2-update-app:
  stage: deploy
  needs:
    - job: deploy:ec2
  before_script:
    - apt-get update -qq && apt-get install -y -qq ssh-client
    - |
      if [ -z "${EC2_SSH_PRIVATE_KEY:-}" ] || [ -z "${EC2_HOST:-}" ]; then
        echo "EC2_SSH_PRIVATE_KEY ou EC2_HOST não definidos; pulando atualização do site/backend."
        exit 0
      fi
    - |
      if [ -f "$EC2_SSH_PRIVATE_KEY" ]; then
        export SSH_KEY_FILE="$EC2_SSH_PRIVATE_KEY"
      else
        echo "$EC2_SSH_PRIVATE_KEY" > "$CI_PROJECT_DIR/deploy_key.pem"
        chmod 600 "$CI_PROJECT_DIR/deploy_key.pem"
        export SSH_KEY_FILE="$CI_PROJECT_DIR/deploy_key.pem"
      fi
    - mkdir -p ~/.ssh && ssh-keyscan -H "${EC2_HOST#*@}" >> ~/.ssh/known_hosts 2>/dev/null || true
  script:
    - cd "$CI_PROJECT_DIR"
    - |
      if [ -z "${EC2_SSH_PRIVATE_KEY:-}" ] || [ -z "${EC2_HOST:-}" ]; then
        echo "Variáveis EC2 não definidas; atualização do site/backend ignorada."
        exit 0
      fi
    - |
      REMOTE_WEB_DIR="/var/www/aplicativo"
      ssh -i "$SSH_KEY_FILE" -o StrictHostKeyChecking=accept-new "$EC2_HOST" "
        set -e
        cd ~/acasa-erp || { echo 'Pasta ~/acasa-erp não existe no servidor.'; exit 1; }
        echo '==> git pull'
        git pull origin main || git pull origin master || git pull

        echo '==> Backend: migrate + build + restart'
        cd ~/acasa-erp/backend
        npx prisma generate
        npx prisma migrate deploy
        npm ci
        npm run build
        pm2 restart acasa-backend || pm2 restart all || true

        echo '==> Frontend web: build + publicar'
        cd ~/acasa-erp/frontend
        export NODE_OPTIONS=\${NODE_OPTIONS:---max-old-space-size=2048}
        npm ci
        npm run build
        sudo rsync -a --delete --exclude 'erp' --exclude 'ponto' --exclude 'downloads' --exclude 'index.html' dist/ $REMOTE_WEB_DIR/
        sudo chown -R www-data:www-data $REMOTE_WEB_DIR
        sudo nginx -t && sudo systemctl reload nginx

        echo 'OK: Site e backend atualizados.'
      "
  environment:
    name: production
  allow_failure: true

# Build Tauri (Desktop Windows). Runner com tag "Windows".
# Variáveis CI: TAURI_SIGNING_PRIVATE_KEY, TAURI_SIGNING_PRIVATE_KEY_PASSWORD
build:tauri:
  stage: build
  rules:
    - if: $TAURI_SIGNING_PRIVATE_KEY == null || $TAURI_SIGNING_PRIVATE_KEY == ""
      when: never
    - when: on_success
  before_script:
    - powershell -ExecutionPolicy Bypass -File scripts/setup-tauri-key.ps1
  script:
    - powershell -Command "Set-Location (Join-Path $env:CI_PROJECT_DIR 'frontend'); npm ci"
    - powershell -ExecutionPolicy Bypass -File scripts/run-tauri-build.ps1
    - powershell -ExecutionPolicy Bypass -File scripts/run-tauri-sign-only.ps1
  artifacts:
    expire_in: 1 day
    paths:
      - tauri-artifacts/AcasaSetup.exe
      - tauri-artifacts/latest.json
  allow_failure: true

# Publica o instalador Tauri e latest.json na EC2 (usa artefatos do build:tauri)
deploy:tauri:
  stage: deploy
  needs:
    - job: build:tauri
      artifacts: true
  rules:
    - if: $TAURI_SIGNING_PRIVATE_KEY == null || $TAURI_SIGNING_PRIVATE_KEY == ""
      when: never
    - when: on_success
  before_script:
    - apt-get update -qq && apt-get install -y -qq ssh-client
    - |
      if [ -z "${EC2_SSH_PRIVATE_KEY:-}" ] || [ -z "${EC2_HOST:-}" ]; then
        echo "EC2_SSH_PRIVATE_KEY ou EC2_HOST nao definidos; pulando deploy Tauri."
        exit 0
      fi
    - |
      if [ -f "$EC2_SSH_PRIVATE_KEY" ]; then
        export SSH_KEY_FILE="$EC2_SSH_PRIVATE_KEY"
      else
        echo "$EC2_SSH_PRIVATE_KEY" > "$CI_PROJECT_DIR/deploy_key.pem"
        chmod 600 "$CI_PROJECT_DIR/deploy_key.pem"
        export SSH_KEY_FILE="$CI_PROJECT_DIR/deploy_key.pem"
      fi
    - mkdir -p ~/.ssh && ssh-keyscan -H "${EC2_HOST#*@}" >> ~/.ssh/known_hosts 2>/dev/null || true
  script:
    - 'cd "$CI_PROJECT_DIR"'
    - |
      if [ ! -f "tauri-artifacts/AcasaSetup.exe" ] || [ ! -f "tauri-artifacts/latest.json" ]; then
        echo "Artefatos Tauri nao encontrados (build:tauri pode ter falhado ou nao rodou)."
        exit 0
      fi
    - |
      echo "=== Estado na EC2 antes do deploy ==="
      ssh -i "$SSH_KEY_FILE" -o StrictHostKeyChecking=accept-new "$EC2_HOST" \
        "echo '-- /var/www/aplicativo/erp/' ; ls -la /var/www/aplicativo/erp/ 2>/dev/null || echo '(pasta nao existe)' ; echo '-- /var/www/aplicativo/updates/tauri/' ; ls -la /var/www/aplicativo/updates/tauri/ 2>/dev/null || echo '(pasta nao existe)'"
    - 'scp -i "$SSH_KEY_FILE" -o StrictHostKeyChecking=accept-new tauri-artifacts/AcasaSetup.exe "${EC2_HOST}:/home/ubuntu/AcasaSetup.exe"'
    - 'scp -i "$SSH_KEY_FILE" -o StrictHostKeyChecking=accept-new tauri-artifacts/latest.json "${EC2_HOST}:/home/ubuntu/latest.json"'
    - 'ssh -i "$SSH_KEY_FILE" -o StrictHostKeyChecking=accept-new "$EC2_HOST" "sudo mkdir -p /var/www/aplicativo/erp /var/www/aplicativo/updates/tauri && sudo mv /home/ubuntu/AcasaSetup.exe /var/www/aplicativo/erp/ && sudo mv /home/ubuntu/latest.json /var/www/aplicativo/updates/tauri/ && sudo chown -R www-data:www-data /var/www/aplicativo/erp /var/www/aplicativo/updates/tauri && sudo chmod 644 /var/www/aplicativo/erp/AcasaSetup.exe /var/www/aplicativo/updates/tauri/latest.json"'
    - 'echo "OK: Tauri publicado em aplicativo.acasamarcenaria.com.br/erp/AcasaSetup.exe"'
  environment:
    name: production
  allow_failure: true
