# Sistema completo: MySQL + Backend + Frontends + Evolution API (WhatsApp).
# Use: podman compose up -d   (Docker Engine não é necessário.)
#
# Acesso após subir:
#   ERP (sistema principal):  http://localhost:5173
#   Ponto (app funcionários):  http://localhost:5174
#   API:                      http://localhost:3000/api
#   Evolution API (WhatsApp): http://localhost:8080
#
# 1) Na raiz do projeto, o .env deve ter: DB_USER, DB_PASSWORD, DB_DATABASE, EVOLUTION_API_KEY (pode copiar do backend/.env).
# 2) Crie backend/.env.compose com DATABASE_URL apontando para "mysql" (veja backend/.env.compose.example).
# 3) Para build do frontend sem enviar 12GB: rode "cd frontend && npm run prepare-compose-context" antes de "podman compose build frontend".

services:
  mysql:
    image: docker.io/mysql:8.0
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root}
      MYSQL_DATABASE: ${DB_DATABASE:-acasa_erp}
      MYSQL_USER: ${DB_USER:-acasa_user}
      MYSQL_PASSWORD: ${DB_PASSWORD:?Defina DB_PASSWORD no .env da raiz do projeto}
    ports:
      - "${DB_PORT:-3307}:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      # CMD-SHELL necessário para expandir MYSQL_ROOT_PASSWORD no container
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -u root -p\"$$MYSQL_ROOT_PASSWORD\" || exit 1"]
      interval: 10s
      timeout: 10s
      retries: 15
      start_period: 120s

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
    # Ordem: .env.compose por último para DATABASE_URL usar host "mysql" (não 127.0.0.1)
    env_file:
      - backend/.env
      - backend/.env.compose
    environment:
      # DATABASE_URL deve apontar para o serviço "mysql" (definido em backend/.env.compose).
      # Dentro da rede Compose, EVOLUTION_API_URL usa o nome do serviço, não localhost.
      PORT: 3000
      EVOLUTION_API_URL: http://evolution-api:8080
    ports:
      - "127.0.0.1:3000:3000"
    healthcheck:
      test: ["CMD", "node", "-e", "require('net').connect(3000, '127.0.0.1').on('connect', () => process.exit(0)).on('error', () => process.exit(1))"]
      interval: 15s
      timeout: 10s
      retries: 8
      start_period: 90s
    # Certificado A1 (opcional): monte no container se precisar assinar PDF em runtime
    # volumes:
    #   - C:/Users/SEU_USUARIO/certificados:/certificados:ro

  frontend:
    build:
      # Contexto enxuto (~50MB): rode antes "node frontend/scripts/prepare-compose-context.cjs"
      context: ./frontend/.compose-context
      dockerfile: Dockerfile
      args:
        VITE_API_URL: http://localhost:3000/api
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "5173:80"

  frontend-ponto:
    build:
      context: ./frontend-ponto
      dockerfile: Dockerfile
      args:
        VITE_API_URL: http://localhost:3000/api
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "5174:80"

  # Evolution API (WhatsApp) — Postgres + Redis + API
  evolution-postgres:
    image: docker.io/postgres:15-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: evolution
      POSTGRES_PASSWORD: evolution
      POSTGRES_DB: evolution
    volumes:
      - evolution_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U evolution -d evolution"]
      interval: 5s
      timeout: 5s
      retries: 5

  evolution-redis:
    image: docker.io/redis:7-alpine
    restart: unless-stopped
    command: redis-server --appendonly yes
    volumes:
      - evolution_redis_data:/data

  evolution-api:
    image: docker.io/atendai/evolution-api:v2.1.1
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      SERVER_URL: ${EVOLUTION_SERVER_URL:-http://localhost:8080}
      AUTHENTICATION_API_KEY: ${EVOLUTION_API_KEY}
      CACHE_REDIS_ENABLED: "true"
      CACHE_REDIS_URI: redis://evolution-redis:6379/0
      CACHE_REDIS_PREFIX_KEY: evolution
      DATABASE_ENABLED: "true"
      DATABASE_PROVIDER: postgresql
      DATABASE_CONNECTION_URI: postgresql://evolution:evolution@evolution-postgres:5432/evolution
      DATABASE_CONNECTION_CLIENT_NAME: evolution_exchange
      DATABASE_SAVE_DATA_INSTANCE: "true"
      DATABASE_SAVE_DATA_NEW_MESSAGE: "true"
      DATABASE_SAVE_MESSAGE_UPDATE: "true"
      DATABASE_SAVE_DATA_CONTACTS: "true"
      DATABASE_SAVE_DATA_CHATS: "true"
      DATABASE_SAVE_DATA_LABELS: "true"
      DATABASE_SAVE_DATA_HISTORIC: "true"
    volumes:
      - evolution_instances:/evolution/instances
    depends_on:
      evolution-postgres:
        condition: service_healthy
      evolution-redis:
        condition: service_started

volumes:
  mysql_data:
  evolution_postgres_data:
  evolution_redis_data:
  evolution_instances:
